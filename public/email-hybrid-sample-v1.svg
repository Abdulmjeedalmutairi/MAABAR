  <text x="600" y="136" text-anchor="middle" fill="#F5F5F2" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" letter-spacing="8">MAABAR</text>
  <text x="600" y="180" text-anchor="middle" fill="rgba(245,245,242,0.48)" font-family="Arial, Helvetica, sans-serif" font-size="20" letter-spacing="2">Saudi B2B sourcing, designed as a dark-first email experience</text>
